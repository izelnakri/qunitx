name: Release

on:
  push:
    tags: ['v*']

jobs:
  # ── Test ──────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
      # Run npm ci before setup-deno: qunitx-cli's postinstall runs
      # "deno install || true" and if deno is in PATH it rewrites node_modules/
      # via the .deno/ store, landing NixOS-built SEA binaries that can't run
      # on Ubuntu. Without deno in PATH the postinstall silently no-ops.
      - run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # NixOS-built SEA binaries have Nix store paths as ELF interpreter.
      # Remove execute permission so bin/qunitx.js falls back to dist/cli.js.
      - run: find node_modules -name "qunitx-cli-linux-x64" -o -name "qunitx-cli-linux-arm64" -o -name "qunitx-cli-darwin-x64" -o -name "qunitx-cli-darwin-arm64" -o -name "qunitx-cli-windows-x64" | xargs -I{} chmod -x {}/bin/qunitx 2>/dev/null || true
      - run: npm test
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0

  # ── Release consumer test ──────────────────────────────────────────────────────
  # Packs the built artefact and runs release-consumer-test.ts against the tarball
  # on every supported runtime, catching issues (e.g. broken dist/ exports, missing
  # jsr: bundling) that only surface when a downstream developer installs the package.
  release-consumer-test:
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: find node_modules -name "qunitx-cli-linux-x64" -o -name "qunitx-cli-linux-arm64" -o -name "qunitx-cli-darwin-x64" -o -name "qunitx-cli-darwin-arm64" -o -name "qunitx-cli-windows-x64" | xargs -I{} chmod -x {}/bin/qunitx 2>/dev/null || true
      - run: bash scripts/test-release.sh
        env:
          FORCE_COLOR: 0

  # ── GitHub release ─────────────────────────────────────────────────────────────
  github-release:
    needs: [test, release-consumer-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub release (if not already created locally)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes 2>/dev/null || true

