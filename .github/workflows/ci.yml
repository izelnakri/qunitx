name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────────
  # Surfaces formatting and doc failures fast, independent of the slower test job.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: npm ci
      - run: npm run format
      - run: npm run lint
      - run: npm run lint:docs

  # ── Test ──────────────────────────────────────────────────────────────────────
  # Ubuntu: full suite — browser (qunitx-cli + Chrome), Node, Deno.
  # macOS / Windows: Node and Deno only — browser suite is platform-agnostic JS,
  # testing it on one platform is sufficient. No Chrome or qunitx-cli needed.
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.os == 'ubuntu-latest' && 15 || 25 }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: browser-actions/setup-chrome@v2
        id: setup-chrome
        if: runner.os == 'Linux'
      - uses: actions/cache@v5
        with:
          path: dist
          key: dist-${{ hashFiles('shims/**', 'tsconfig.json', 'deno.lock', 'package-lock.json', 'build.ts') }}
          restore-keys: dist-
      # npm ci runs qunitx-cli's postinstall: "deno install --allow-scripts=npm:playwright-core || true"
      # If deno is in PATH, it rewrites node_modules/ layout via .deno/ store and the
      # NixOS-built SEA binaries end up there. Run npm ci before setup-deno so the
      # postinstall silently skips (deno not found) and npm owns node_modules/.
      - run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      # The qunitx-cli Linux SEA binaries are built on NixOS with Nix store paths
      # hardcoded as their ELF interpreter — they cannot run on standard Linux.
      # macOS (Mach-O) and Windows (PE) binaries are built on native runners and work fine.
      # bin/qunitx.js checks X_OK before spawning, so removing execute permission
      # forces it to fall back to the portable JS CLI (dist/cli.js).
      - run: find node_modules -name "qunitx-cli-linux-x64" -o -name "qunitx-cli-linux-arm64" | xargs -I{} chmod -x {}/bin/qunitx 2>/dev/null || true
        if: runner.os == 'Linux'
      - run: npm test
        if: runner.os == 'Linux'
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          FORCE_COLOR: 0
      - run: npm run pretest
        if: runner.os != 'Linux'
      - run: npm run test:node
        if: runner.os != 'Linux'
      - run: npm run test:deno
        if: runner.os != 'Linux'

  # ── Bench ─────────────────────────────────────────────────────────────────────
  # Runs microbenchmarks (assertions, context lifecycle, utility functions) on
  # every push and PR. Results are informational — the regression gate lives in
  # `make release` (bench-check) which runs locally against the saved baseline.
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno bench --no-check --allow-read --allow-env benches/assert.bench.ts benches/context.bench.ts benches/utils.bench.ts

  # ── Coverage ──────────────────────────────────────────────────────────────────
  # Runs Deno tests with coverage, enforces 85% line gate, and uploads reports.
  # Parallel with test — no browser or Node setup needed.
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/cache@v5
        with:
          path: dist
          key: dist-${{ hashFiles('shims/**', 'tsconfig.json', 'deno.lock', 'package-lock.json', 'build.ts') }}
          restore-keys: dist-
      - run: npm ci
      - run: npm run coverage
      - uses: codecov/codecov-action@v6
        with:
          files: tmp/coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: tmp/coverage/html/
          retention-days: 1

  # ── Release consumer test ──────────────────────────────────────────────────────
  # Packs the built artefact and runs release-consumer-test.ts against the tarball
  # on every supported runtime, catching issues (e.g. broken dist/ exports, missing
  # jsr: bundling) that only surface when a downstream developer installs the package.
  # Runs on all three target platforms to catch OS-specific packaging regressions.
  release-consumer-test:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test]
    name: release-consumer-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: find node_modules -name "qunitx-cli-linux-x64" -o -name "qunitx-cli-linux-arm64" | xargs -I{} chmod -x {}/bin/qunitx 2>/dev/null || true
        if: runner.os == 'Linux'
      - run: bash scripts/test-release.sh
        shell: bash
        env:
          FORCE_COLOR: 0

  # ── GitHub release ─────────────────────────────────────────────────────────────
  # Intentionally NOT gated on release-consumer-test: by the time this runs,
  # `make release` has already published to npm, so blocking the GitHub
  # release on a flaky consumer test causes drift (npm has it, GH doesn't).
  # release-consumer-test still runs in parallel and surfaces failures in CI
  # status; release-reconcile.yml is the weekly backstop for any other
  # publish failures (GH API outages, runner death, etc.).
  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/publish-release
        with:
          tag: ${{ github.ref_name }}
          github_token: ${{ github.token }}
